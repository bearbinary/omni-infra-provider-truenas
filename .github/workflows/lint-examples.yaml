name: Lint example workflows

on:
  push:
    paths:
      - "examples/**/*.yaml"
      - "examples/**/*.yml"
      - ".github/workflows/lint-examples.yaml"
  pull_request:
    paths:
      - "examples/**/*.yaml"
      - "examples/**/*.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Run actionlint on example workflows
        run: |
          # actionlint is a static analyzer for GitHub Actions workflows.
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color examples/personal-fork/release.yaml.template
