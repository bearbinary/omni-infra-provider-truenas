name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # Run tests before releasing — gate the release on CI passing
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Test
        run: make test

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write  # Required for cosign keyless signing via Sigstore OIDC
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Fail fast: if a release already exists for this tag, assets are immutable
      # and cannot be overwritten. Delete the release first if you need to re-run.
      - name: Check for existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "::error::Release ${{ github.ref_name }} already exists. Immutable releases cannot be updated. To re-release: gh release delete ${{ github.ref_name }} --yes && git push origin :refs/tags/${{ github.ref_name }}"
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version from tag
        id: version
        run: echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")

          # Extract the section for this version from CHANGELOG.md.
          # Matches from "## [vX.Y.Z]" to the next "## [" or end of file.
          VERSION="${TAG#v}"  # strip leading v for flexible matching
          NOTES=$(awk "/^## \\[v?${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "::warning::No CHANGELOG.md entry found for ${TAG}. Falling back to git log."
            RANGE="${PREV_TAG:+${PREV_TAG}..}${TAG}"
            NOTES=$(git log "$RANGE" --pretty=format:"- %s (%h)" 2>/dev/null || true)
          fi

          {
            echo "$NOTES"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${TAG}"
          } > RELEASE_NOTES.md

          echo "--- Release notes ---"
          cat RELEASE_NOTES.md

      - name: Build binaries
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o _out/omni-infra-provider-truenas-linux-amd64 ./cmd/omni-infra-provider-truenas
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o _out/omni-infra-provider-truenas-linux-arm64 ./cmd/omni-infra-provider-truenas
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o _out/omni-infra-provider-truenas-darwin-amd64 ./cmd/omni-infra-provider-truenas
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o _out/omni-infra-provider-truenas-darwin-arm64 ./cmd/omni-infra-provider-truenas

      - name: Generate checksums
        run: |
          cd _out
          sha256sum * > checksums.txt

      # --- Supply Chain Security (before release creation) ---

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        id: docker-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker image
        run: |
          cosign sign --yes \
            --oidc-issuer=https://token.actions.githubusercontent.com \
            ghcr.io/${{ github.repository }}@${{ steps.docker-push.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.docker-push.outputs.digest }}
          artifact-name: sbom-${{ steps.version.outputs.tag }}.spdx.json
          output-file: _out/sbom.spdx.json

      - name: Attest SBOM to image
        run: |
          cosign attest --yes \
            --oidc-issuer=https://token.actions.githubusercontent.com \
            --predicate _out/sbom.spdx.json \
            --type spdxjson \
            ghcr.io/${{ github.repository }}@${{ steps.docker-push.outputs.digest }}

      - name: Sign release binaries
        run: |
          for f in _out/omni-infra-provider-truenas-*; do
            cosign sign-blob --yes \
              --oidc-issuer=https://token.actions.githubusercontent.com \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.cert" \
              "$f"
          done

      # Single atomic release creation — all assets uploaded together.
      # With immutable releases, assets cannot be modified after creation.
      # If this step fails, delete the release and re-tag to retry.
      - name: Create GitHub Release with all assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md \
            _out/omni-infra-provider-truenas-linux-amd64 \
            _out/omni-infra-provider-truenas-linux-arm64 \
            _out/omni-infra-provider-truenas-darwin-amd64 \
            _out/omni-infra-provider-truenas-darwin-arm64 \
            _out/checksums.txt \
            _out/sbom.spdx.json \
            _out/*.sig \
            _out/*.cert
