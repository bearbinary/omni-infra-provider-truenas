name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # Gate release on tests passing. `go test` compiles the packages, so a
  # separate `make build` step would duplicate compilation — skip it.
  # `make test` runs with `-race` (see Makefile) so data races like the
  # gotPaths race fixed in v0.14.7 would fail here rather than ship.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test (unit + cassette replay, race-enabled)
        run: make test

      # Cassette-replay gate: fail the release if an integration test has no
      # cassette to replay against. Without this, a deleted cassette turns an
      # integration test into a silent no-op that reports green.
      - name: Verify integration cassettes present
        env:
          CI_REQUIRE_CASSETTES: "1"
        run: go test -count=1 -run TestIntegration_ ./internal/client/... ./internal/cleanup/... ./internal/provisioner/...

  # Cross-compile each target on its own runner in parallel. Each job uploads
  # its binary as an artifact; the release job downloads all four.
  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ github.ref_name }}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          OUT="_out/omni-infra-provider-truenas-${GOOS}-${GOARCH}"
          mkdir -p _out
          go build -ldflags="$LDFLAGS" -o "$OUT" ./cmd/omni-infra-provider-truenas

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: _out/omni-infra-provider-truenas-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write  # Required for cosign keyless signing via Sigstore OIDC
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Fail fast: if a release already exists for this tag, assets are immutable
      # and cannot be overwritten. Delete the release first if you need to re-run.
      - name: Check for existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "::error::Release ${{ github.ref_name }} already exists. Immutable releases cannot be updated. To re-release: gh release delete ${{ github.ref_name }} --yes && git push origin :refs/tags/${{ github.ref_name }}"
            exit 1
          fi

      - name: Set version from tag
        id: version
        run: echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")

          # Extract the section for this version from CHANGELOG.md.
          # Matches from "## [vX.Y.Z]" to the next "## [" or end of file.
          VERSION="${TAG#v}"  # strip leading v for flexible matching
          NOTES=$(awk "/^## \\[v?${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "::warning::No CHANGELOG.md entry found for ${TAG}. Falling back to git log."
            RANGE="${PREV_TAG:+${PREV_TAG}..}${TAG}"
            NOTES=$(git log "$RANGE" --pretty=format:"- %s (%h)" 2>/dev/null || true)
          fi

          {
            echo "$NOTES"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${TAG}"
          } > RELEASE_NOTES.md

          echo "--- Release notes ---"
          cat RELEASE_NOTES.md

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: _out
          pattern: binary-*
          merge-multiple: true

      # actions/upload-artifact + download-artifact package files as ZIP and
      # strip the execute bit. Without this chmod, release-page binaries
      # downloaded by users fail with "Permission denied" when run directly.
      # (The Dockerfile sets --chmod=0755 independently for the container image.)
      - name: Restore executable bit on binaries
        run: chmod +x _out/omni-infra-provider-truenas-*

      - name: Generate checksums
        run: |
          cd _out
          sha256sum * > checksums.txt

      # --- Supply Chain Security (before release creation) ---

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      # Build single-arch (runner-native) image into the local Docker daemon
      # so we can smoke test it *before* pushing multi-arch. If we pushed
      # first and then tested, a broken image (e.g. missing execute bit,
      # corrupted binary) would already be live on GHCR by the time the test
      # flagged it. Building locally first + pushing only on success means a
      # broken image never reaches users. BuildKit cache (type=gha) makes
      # the second multi-arch build a near-no-op for the native-arch layer.
      - name: Build image locally for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: smoke-test:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Catches the "permission denied" class of regressions that slipped
      # through v0.14.1–v0.14.3, where actions/upload-artifact stripped the
      # execute bit from the binary and docker COPY preserved the zero mode.
      # The `--version` handler exits 0 immediately without needing Omni or
      # TrueNAS config, so the only thing it tests is "can the binary run".
      - name: Smoke test local image (binary is executable)
        run: |
          set -euo pipefail
          IMAGE="smoke-test:${{ steps.version.outputs.tag }}"
          echo "Running --version inside ${IMAGE}..."
          OUTPUT=$(docker run --rm "${IMAGE}" --version 2>&1)
          echo "stdout: ${OUTPUT}"
          if [ -z "${OUTPUT}" ]; then
            echo "::error::Smoke test failed: --version produced no output. Binary is likely missing the execute bit or crashed on startup."
            exit 1
          fi
          EXPECTED="${{ steps.version.outputs.tag }}"
          if [ "${OUTPUT}" != "${EXPECTED}" ]; then
            echo "::error::Smoke test failed: expected version ${EXPECTED}, got ${OUTPUT}. The ldflags -X main.version=... did not take effect during build."
            exit 1
          fi
          echo "Smoke test passed: image runs and reports version ${OUTPUT}"

      # Image- and Dockerfile-level invariants that are easy to silently break:
      #
      # 1. Container runtime UID. `USER 65534:65534` (set in v0.14.5) aligns
      #    container writes with TrueNAS host `nobody`. If a future Dockerfile
      #    edit drops the USER directive, the distroless :nonroot default
      #    (uid 65532) takes over and bind mounts on TrueNAS hosts get owned
      #    by an unexpected uid — silent permission errors on PVC writes.
      #
      # 2. Dockerfile content. The `--chmod=0755` and `USER` directives are
      #    the runtime versions of v0.14.4 and v0.14.5 fixes. If they drop
      #    out of the Dockerfile during a refactor, only the runtime smoke
      #    test catches them — and only one of them at a time. The grep
      #    asserts here fail the build immediately on Dockerfile drift.
      - name: Verify image and Dockerfile invariants
        run: |
          set -euo pipefail
          IMAGE="smoke-test:${{ steps.version.outputs.tag }}"

          USER_GID=$(docker inspect "${IMAGE}" --format '{{.Config.User}}')
          if [ "${USER_GID}" != "65534:65534" ]; then
            echo "::error::Container runs as ${USER_GID}, expected 65534:65534 (TrueNAS nobody alignment, set in v0.14.5)."
            echo "::error::If you intentionally changed this, update the test and the v0.14.5 CHANGELOG entry."
            exit 1
          fi
          echo "OK: image Config.User = ${USER_GID}"

          if ! grep -q -- '--chmod=0755' Dockerfile; then
            echo "::error::Dockerfile is missing 'COPY --chmod=0755'. This is the v0.14.4 fix for the actions/upload-artifact ZIP-strips-execute-bit regression."
            echo "::error::Without it, the published image fails to start with: exec: '/usr/local/bin/omni-infra-provider-truenas': permission denied"
            exit 1
          fi
          echo "OK: Dockerfile contains --chmod=0755"

          if ! grep -q '^USER 65534:65534' Dockerfile; then
            echo "::error::Dockerfile is missing 'USER 65534:65534'. This is the v0.14.5 fix for TrueNAS nobody alignment."
            exit 1
          fi
          echo "OK: Dockerfile contains USER 65534:65534"

      # Only reached if the smoke test + invariant checks passed. Multi-arch build pushed to GHCR.
      - name: Build and push Docker image
        id: docker-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker image
        run: |
          cosign sign --yes \
            --oidc-issuer=https://token.actions.githubusercontent.com \
            ghcr.io/${{ github.repository }}@${{ steps.docker-push.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.docker-push.outputs.digest }}
          artifact-name: sbom-${{ steps.version.outputs.tag }}.spdx.json
          output-file: _out/sbom.spdx.json

      - name: Attest SBOM to image
        run: |
          cosign attest --yes \
            --oidc-issuer=https://token.actions.githubusercontent.com \
            --predicate _out/sbom.spdx.json \
            --type spdxjson \
            ghcr.io/${{ github.repository }}@${{ steps.docker-push.outputs.digest }}

      - name: Sign release binaries
        run: |
          for f in _out/omni-infra-provider-truenas-*; do
            cosign sign-blob --yes \
              --oidc-issuer=https://token.actions.githubusercontent.com \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.cert" \
              "$f"
          done

      # Bundle Grafana dashboards + Prometheus alert rules for easy import.
      # Users can grab individual JSONs, the zip, or the alerts YAML from the
      # release page and drop them into Grafana Cloud / self-hosted Prom.
      - name: Bundle observability assets
        run: |
          cp deploy/observability/dashboards/*.json _out/
          cp deploy/observability/alerts/*.yml _out/
          (cd deploy/observability/dashboards && zip -r - *.json) > _out/grafana-dashboards.zip

      # Single atomic release creation — all assets uploaded together.
      # With immutable releases, assets cannot be modified after creation.
      # If this step fails, delete the release and re-tag to retry.
      - name: Create GitHub Release with all assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md \
            _out/omni-infra-provider-truenas-linux-amd64 \
            _out/omni-infra-provider-truenas-linux-arm64 \
            _out/omni-infra-provider-truenas-darwin-amd64 \
            _out/omni-infra-provider-truenas-darwin-arm64 \
            _out/checksums.txt \
            _out/sbom.spdx.json \
            _out/*.sig \
            _out/*.cert \
            _out/grafana-dashboards.zip \
            _out/overview.json \
            _out/provisioning.json \
            _out/api-performance.json \
            _out/cleanup.json \
            _out/truenas-provider.rules.yml