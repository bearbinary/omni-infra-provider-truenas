name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Test
        run: make test

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install betterleaks
        run: |
          curl -sSfL https://github.com/betterleaks/betterleaks/releases/latest/download/betterleaks-linux-amd64 -o /usr/local/bin/betterleaks
          chmod +x /usr/local/bin/betterleaks

      - name: Scan for secrets
        run: betterleaks git --baseline-path .betterleaks-baseline.json --verbose --exit-code 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # golangci-lint does not yet support Go 1.26 — use go vet + gofmt directly
      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Files not formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
