name: E2E Tests

# Manual-trigger only. GitHub-hosted runners cannot reach a home/lab TrueNAS,
# and we do not want live TrueNAS credentials sitting in a public repo's
# secrets store. Real E2E is operator-run locally (`make test-integration`)
# against your own TrueNAS. Cassette-replay integration tests in ci.yaml
# cover the API surface without hardware.
#
# Requires repository secrets (only if you choose to wire a self-hosted
# runner later): TRUENAS_TEST_HOST, TRUENAS_TEST_API_KEY, TRUENAS_TEST_POOL,
# TRUENAS_TEST_NETWORK_INTERFACE.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Run E2E tests
        env:
          TRUENAS_TEST_HOST: ${{ secrets.TRUENAS_TEST_HOST }}
          TRUENAS_TEST_API_KEY: ${{ secrets.TRUENAS_TEST_API_KEY }}
          TRUENAS_TEST_POOL: ${{ secrets.TRUENAS_TEST_POOL }}
          TRUENAS_TEST_NETWORK_INTERFACE: ${{ secrets.TRUENAS_TEST_NETWORK_INTERFACE }}
        run: |
          if [ -z "$TRUENAS_TEST_HOST" ]; then
            echo "::error::E2E secrets missing. This workflow is manual-only and expects a self-hosted runner with network reach to TrueNAS. See docs/testing.md."
            exit 1
          fi
          make test-e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-results
          path: _out/test-results/
          retention-days: 7
          if-no-files-found: ignore
