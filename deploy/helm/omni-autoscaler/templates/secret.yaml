{{/*
Secret holding the Omni service-account key and (optional) TrueNAS
API key. Kept as a separate resource from the ConfigMap so RBAC can
scope secret-read access independently — operators doing secret
rotation don't have to grant ConfigMap-read at the same time.

Keys use the same env-var names the subcommand reads from the
process environment. The Deployment mounts these via envFrom so a
key rotation is a secret update + pod restart, not a chart
re-render.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omni-autoscaler.fullname" . }}-secrets
  labels:
    {{- include "omni-autoscaler.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Omni service-account key. Required when .Values.omni.endpoint
  # is a remote (non-localhost) address; skipped otherwise.
  {{- if .Values.omni.serviceAccountKeyB64 }}
  OMNI_SERVICE_ACCOUNT_KEY: {{ .Values.omni.serviceAccountKeyB64 | quote }}
  {{- end }}
  {{- if .Values.truenas.apiKey }}
  TRUENAS_API_KEY: {{ .Values.truenas.apiKey | quote }}
  {{- end }}
