{{- if .Values.serviceAccount.create }}
{{/*
ServiceAccount the Deployment runs as. The autoscaler subcommand
itself doesn't call the Kubernetes API (all scaling goes through
Omni), but cluster-autoscaler *does* watch K8s nodes/pods for
pressure detection. RBAC lives outside this chart (see
docs/autoscaler.md for the ClusterRoleBinding recipe) so operators
can bind CAS's required ClusterRole to this SA without the chart
needing cluster-admin at install time.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "omni-autoscaler.serviceAccountName" . }}
  labels:
    {{- include "omni-autoscaler.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
