## @section Global
nameOverride: ""
fullnameOverride: ""

## @section Image
image:
  repository: ghcr.io/bearbinary/omni-infra-provider-truenas
  # -- Overrides the image tag. Defaults to `v<Chart.AppVersion>`.
  # tag: "v0.13.0"
  pullPolicy: IfNotPresent

## @section Omni Connection
# -- Omni control plane endpoint (required)
omniEndpoint: "https://omni.example.com"

## @section TrueNAS Connection
# -- TrueNAS host (WebSocket transport, since Unix socket is not available in K8s).
# This provider requires TrueNAS SCALE 25.04+ (JSON-RPC 2.0). REST v2.0 is NOT supported.
truenasHost: "truenas.local"

# -- Set to true only if TrueNAS uses a self-signed certificate.
# WARNING: Disabling TLS verification allows MITM attacks — avoid in production.
truenasInsecureSkipVerify: false

## @section Provider Identity
provider:
  id: "truenas"
  name: "TrueNAS"
  description: "TrueNAS SCALE infrastructure provider"

## @section VM Defaults
defaults:
  pool: "default"
  networkInterface: ""
  bootMethod: "UEFI"

concurrency: 4
logLevel: "info"
gracefulShutdownTimeout: 30

# -- HTTP health endpoint address (/healthz, /readyz)
healthListenAddr: ":8081"

## @section Secrets
# -- Secrets — set via --set or a values file (do not commit real credentials)
secrets:
  # Omni service account key (from: omnictl serviceaccount create --role=InfraProvider ...)
  omniServiceAccountKey: ""
  # TrueNAS API key (from: TrueNAS UI > System > API Keys)
  truenasApiKey: ""

# -- Use an existing Secret instead of creating one.
# The Secret must contain OMNI_SERVICE_ACCOUNT_KEY and TRUENAS_API_KEY keys.
existingSecret: ""

## @section Pod
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
