## @section Global
nameOverride: ""
fullnameOverride: ""

## @section Image
image:
  repository: ghcr.io/bearbinary/omni-infra-provider-truenas
  # -- Overrides the image tag. Defaults to `v<Chart.AppVersion>`.
  # tag: "v0.13.0"
  pullPolicy: IfNotPresent

## @section Omni Connection
# -- Omni control plane endpoint (required)
omniEndpoint: "https://omni.example.com"

## @section TrueNAS Connection
# -- TrueNAS host — the provider connects via WebSocket JSON-RPC 2.0.
# Requires TrueNAS SCALE 25.10+ (Goldeye). REST v2.0 is NOT supported.
truenasHost: "truenas.local"

# -- Set to true only if TrueNAS uses a self-signed certificate.
# WARNING: Disabling TLS verification allows MITM attacks — avoid in production.
truenasInsecureSkipVerify: false

## @section Provider Identity
provider:
  id: "truenas"
  name: "TrueNAS"
  description: "TrueNAS SCALE infrastructure provider"

## @section VM Defaults
defaults:
  pool: "default"
  networkInterface: ""
  bootMethod: "UEFI"

concurrency: 4
logLevel: "info"
gracefulShutdownTimeout: 30

# -- HTTP health endpoint address (/healthz, /readyz)
healthListenAddr: ":8081"

## @section Singleton Enforcement
# -- Prevents two instances with the same PROVIDER_ID from racing on provisioning.
# The chart already uses strategy.type=Recreate so rolling-deploy overlap is not a
# concern. Leave enabled unless you have an advanced sharding setup or need to
# bypass the check for debugging.
singleton:
  enabled: true
  # -- How often the lease heartbeat is refreshed.
  refreshInterval: "15s"
  # -- Age at which another instance may take over (must be >= 2 * refreshInterval).
  staleAfter: "45s"

## @section Secrets
# -- Secrets — set via --set or a values file (do not commit real credentials)
secrets:
  # Omni service account key (from: omnictl serviceaccount create --role=InfraProvider ...)
  omniServiceAccountKey: ""
  # TrueNAS API key (from: TrueNAS UI > System > API Keys)
  truenasApiKey: ""

# -- Use an existing Secret instead of creating one.
# The Secret must contain OMNI_SERVICE_ACCOUNT_KEY and TRUENAS_API_KEY keys.
existingSecret: ""

## @section Pod
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
