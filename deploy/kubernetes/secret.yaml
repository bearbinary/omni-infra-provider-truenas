apiVersion: v1
kind: Secret
metadata:
  name: omni-infra-provider-truenas
  namespace: omni-infra-provider
  labels:
    app.kubernetes.io/name: omni-infra-provider-truenas
    app.kubernetes.io/part-of: omni
type: Opaque
stringData:
  # Omni service account key (from: omnictl serviceaccount create --role=InfraProvider ...)
  OMNI_SERVICE_ACCOUNT_KEY: ""
  # TrueNAS API key (from: TrueNAS UI > System > API Keys)
  TRUENAS_API_KEY: ""
  # ZFS encryption passphrase — MUST be in this Secret, never in the ConfigMap.
  # Required only when encrypted=true in MachineClass config.
  # ENCRYPTION_PASSPHRASE: ""
