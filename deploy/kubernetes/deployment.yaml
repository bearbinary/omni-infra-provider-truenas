apiVersion: apps/v1
kind: Deployment
metadata:
  name: omni-infra-provider-truenas
  namespace: omni-infra-provider
  labels:
    app.kubernetes.io/name: omni-infra-provider-truenas
    app.kubernetes.io/part-of: omni
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: omni-infra-provider-truenas
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omni-infra-provider-truenas
        app.kubernetes.io/part-of: omni
    spec:
      containers:
        - name: provider
          image: ghcr.io/zclifton/omni-infra-provider-truenas:latest
          envFrom:
            - configMapRef:
                name: omni-infra-provider-truenas
            - secretRef:
                name: omni-infra-provider-truenas
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep omni-infra-provider-truenas"
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
