apiVersion: apps/v1
kind: Deployment
metadata:
  name: omni-infra-provider-truenas
  namespace: omni-infra-provider
  labels:
    app.kubernetes.io/name: omni-infra-provider-truenas
    app.kubernetes.io/part-of: omni
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: omni-infra-provider-truenas
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omni-infra-provider-truenas
        app.kubernetes.io/part-of: omni
    spec:
      containers:
        - name: provider
          image: ghcr.io/bearbinary/omni-infra-provider-truenas:v0.2.0  # Update to match your release tag
          envFrom:
            - configMapRef:
                name: omni-infra-provider-truenas
            - secretRef:
                name: omni-infra-provider-truenas
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          ports:
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
