groups:
  - name: truenas-provider
    # Explicit interval: 30s so Cortex / Thanos ruler consumers evaluate
    # every 30s instead of falling back to the ruler's global default
    # (which varies across deployments). Matches the Prometheus scrape
    # cadence typical for the provider's /metrics endpoint.
    interval: 30s
    rules:
      # SLI recording rule: 5-minute rolling ratio of clean wsTransport.Close
      # outcomes vs. all outcomes. Foundation for future SLI work — an alert
      # can page on `truenas:ws_close_success_ratio_5m < 0.99` without every
      # dashboard re-deriving the ratio.
      - record: truenas:ws_close_success_ratio_5m
        expr: |
          sum(rate(truenas_ws_close_outcome_total{outcome="clean"}[5m]))
            /
          sum(rate(truenas_ws_close_outcome_total[5m]))

      # Reconnect storm — a leading indicator for the close-race class.
      # Distinct from TrueNASWSReconnectsHigh (rate > 0.1/s for 10m):
      # this fires faster (5m) on a higher threshold (>0.5/s), catching
      # the "TrueNAS peer is flapping and every close-race window is
      # about to open" scenario before the class-A alert reaches its
      # 10m for-window.
      - alert: TrueNASWSReconnectStorm
        expr: rate(truenas_ws_reconnects_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket reconnect storm ({{ printf \"%.2f\" $value }} reconnects/s over 5m)"
          description: "wsTransport is reconnecting > 0.5/s. Every reconnect widens the close-race window (reconnect() holds connMu.Lock across backoff + dial retries). If this is sustained, expect TrueNASWSCloseTimeouts to follow. Check TrueNAS middleware health and network path."
          runbook_url: "https://github.com/BearBinary/omni-infra-provider-truenas/blob/main/docs/concurrency-patterns.md#runtime-observability"

      # VM provisioning errors are increasing
      - alert: TrueNASProviderVMErrors
        expr: rate(truenas_vms_errored_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "TrueNAS provider VM errors increasing"
          description: "VM provision/deprovision errors have been occurring for 5+ minutes. Check provider logs."

      # TrueNAS API is slow
      - alert: TrueNASAPILatencyHigh
        expr: histogram_quantile(0.99, rate(truenas_api_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "TrueNAS API p99 latency > 30s"
          description: "TrueNAS API calls are taking over 30 seconds at p99. Check TrueNAS load and network."

      # Pool running low on space
      - alert: TrueNASPoolSpaceLow
        expr: truenas_host_pool_free_bytes / (truenas_host_pool_free_bytes + truenas_host_pool_used_bytes) < 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "TrueNAS pool {{ $labels.pool }} has < 10% free space"
          description: "Pool {{ $labels.pool }} is running low on space. New VM provisioning may fail."

      # Pool is unhealthy (degraded or faulted)
      - alert: TrueNASPoolUnhealthy
        expr: truenas_host_pool_healthy == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "TrueNAS pool {{ $labels.pool }} is unhealthy"
          description: "Pool {{ $labels.pool }} is degraded or faulted. Check disk health immediately."

      # No VMs running (may indicate provider issue)
      - alert: TrueNASNoVMsRunning
        expr: truenas_host_vms_running == 0
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "No TrueNAS VMs running"
          description: "No VMs have been running for 15+ minutes. This may be expected or indicate a problem."

      # ISO download taking too long
      - alert: TrueNASISODownloadSlow
        expr: histogram_quantile(0.99, rate(truenas_iso_download_duration_seconds_bucket[5m])) > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ISO downloads taking > 5 minutes"
          description: "Talos ISO downloads are slow. Check network connectivity to factory.talos.dev."

      # Provision duration is high
      - alert: TrueNASProvisionSlow
        expr: histogram_quantile(0.99, rate(truenas_provision_duration_seconds_bucket[5m])) > 600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VM provisioning taking > 10 minutes"
          description: "New VM provisioning is taking longer than expected."

      # Health checks failing
      - alert: TrueNASHealthCheckFailing
        expr: rate(truenas_healthcheck_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "TrueNAS provider health checks failing"
          description: "Health checks have been failing for 5+ minutes. The provider may be marked unhealthy in Omni."

      # WebSocket reconnects happening frequently
      - alert: TrueNASWSReconnectsHigh
        expr: rate(truenas_ws_reconnects_total[5m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Frequent WebSocket reconnections to TrueNAS"
          description: "WebSocket is reconnecting frequently. Check network stability and TrueNAS middleware health."

      # Too many forced shutdowns (graceful timeout too short)
      - alert: TrueNASForcedShutdownsHigh
        expr: truenas_shutdown_forced_total / (truenas_shutdown_graceful_total + truenas_shutdown_forced_total) > 0.5
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "Over 50% of VM shutdowns are forced"
          description: "Most VMs are not shutting down gracefully. Consider increasing GRACEFUL_SHUTDOWN_TIMEOUT or checking qemu-guest-agent."

      # Host RAM is full and the provider's OOM circuit breaker is
      # exercising itself. This is the exact incident that the v0.16.1
      # host_oom error path was added to surface — without an alert here,
      # operators only see "uploadISO 2/4" stuck in the Omni UI for
      # an hour before realizing the host is the problem.
      - alert: TrueNASHostOOM
        expr: rate(truenas_provision_errors_total{error_category="host_oom"}[10m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "TrueNAS host RAM exhausted — operator action required"
          description: "vm.start is failing with ENOMEM. The host cannot guarantee guest memory at boot. Stop another VM, shrink the affected MachineClass, set min_memory to enable balloon, or add physical RAM. See docs/troubleshooting.md#vm-creation-succeeds-but-vm-wont-start-host-out-of-memory."

      # Permanent OOM giveup — the circuit breaker has tripped after
      # MaxStartOOMAttempts retries. Distinct from the recoverable retry
      # alert above: this fires when a MachineRequest has gone permanent-
      # failed and Omni surfaces the error on MachineRequestStatus.
      - alert: TrueNASOOMPermanent
        expr: rate(truenas_vms_oom_permanent_total[1h]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "VMs returning permanent OOM failure (circuit breaker tripped)"
          description: "One or more MachineRequests exhausted MAX_START_OOM_ATTEMPTS retries. The provider has stopped retrying and surfaced the failure on MachineRequestStatus. Operator must free host RAM or shrink the MachineClass, then delete and recreate the request."

      # MachineClass exceeds host RAM (oversized-class config error,
      # distinct from runtime host_oom). Different operator response:
      # fix the MachineClass YAML, not the host.
      - alert: TrueNASMachineClassOversized
        expr: rate(truenas_provision_errors_total{error_category="memory"}[10m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "MachineClass requests more RAM than the host has"
          description: "A MachineClass `memory` value exceeds 80% of host total RAM. Edit the MachineClass to a value that fits, or add physical RAM. See docs/sizing.md."

      # Pre-flight memory check is silently degrading — the running-guest
      # aggregate query (vm.query) is failing, so the free-RAM safety net
      # is OFF for affected provisions. Sustained degradation is the
      # leading indicator for the original ENOMEM-loop bug to reappear.
      - alert: TrueNASPreflightDegraded
        expr: rate(truenas_preflight_degraded_total[10m]) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Pre-flight memory safety net silently disabled"
          description: "vm.query is failing during pre-flight, so RunningGuestsMemoryMiB cannot be computed. The provision is admitted on the single-VM ceiling alone — runtime ENOMEM at vm.start is now possible. Check WebSocket health and TrueNAS middleware logs."

      # Circuit breaker auto-replacing VMs (persistent ERROR state)
      - alert: TrueNASVMAutoReplaced
        expr: rate(truenas_vms_auto_replaced_total[1h]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "VMs being auto-replaced by circuit breaker"
          description: "One or more VMs exceeded MAX_ERROR_RECOVERIES and were automatically deprovisioned for replacement. This indicates a persistent issue — check TrueNAS firmware, pool health, or host hardware."

      # Orphan VMs being cleaned up (indicates provider/Omni state drift)
      - alert: TrueNASOrphanVMsDetected
        expr: rate(truenas_cleanup_orphan_vms_total[1h]) > 0
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "Orphan VMs detected and cleaned up"
          description: "The cleanup process is finding and removing orphan VMs. This may indicate provider restarts or Omni state drift."

      # Supply-chain: TOFU hash mismatch on Talos ISO. Either the factory
      # rotated bytes under the same URL (download path) or someone tampered
      # with the cached file on TrueNAS (cache_hit_metadata path). Both
      # require operator investigation; the detection_path label tells the
      # on-call which runbook to follow.
      - alert: TrueNASISOHashMismatch
        expr: rate(truenas_iso_hash_mismatches_total[1h]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Talos ISO TOFU mismatch ({{ $labels.detection_path }})"
          description: "An ISO failed TOFU hash verification. detection_path={{ $labels.detection_path }}: 'download' = factory rotated under the same URL; 'cache_hit_metadata' = on-disk bytes were tampered after the baseline was recorded. See docs/hardening.md cleanup recipe."

      # Supply-chain: a confirmed-bad ISO is still on disk because the
      # POISON marker write failed every retry. The next provision will
      # silently reuse the bad bytes until an operator deletes the file by
      # hand. Highest-severity log line in the provider — alert immediately.
      - alert: TrueNASISOPoisonMarkerWriteFailed
        expr: rate(truenas_iso_poison_marker_write_failed_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Manual ISO cleanup required on TrueNAS"
          description: "POISON marker write exhausted retries. Confirmed-bad bytes remain trusted by the next cache hit until operator deletes the file. See provider logs (grep MANUAL CLEANUP REQUIRED) for the exact path; cleanup steps in docs/hardening.md."

      # Supply-chain: companion property writes (size / mtime / hash) failing
      # at upload-time silently degrade cache-hit re-verification to
      # "first-use" for the missing field. Sustained failure means TOFU
      # detection narrows over time without a loud signal.
      - alert: TrueNASISOTOFUMetadataWriteFailing
        expr: rate(truenas_iso_tofu_metadata_write_failed_total[30m]) > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "ISO TOFU metadata write failing for property {{ $labels.property }}"
          description: "Companion property write ({{ $labels.property }}) is failing at upload-time. Cache-hit re-verification will degrade for this field. Check TrueNAS user-property quota and provider WS health."

      # A long-lived transport goroutine panicked. The recover wrapper caught
      # + logged + counted + re-panicked; the process is in a crash-loop.
      # This is the signal that would have surfaced the WaitGroup-reuse
      # incident within seconds — see docs/concurrency-patterns.md.
      - alert: TrueNASWSGoroutinePanicRecurrence
        expr: increase(truenas_ws_goroutine_panics_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "WebSocket transport goroutine panicked ({{ $labels.site }})"
          description: "A wsTransport lifecycle goroutine (site={{ $labels.site }}) panicked and was caught by the recover wrapper. The process re-panicked — expect crash-loop until the underlying race is fixed. Grep provider logs for event=goroutine_panic (or 'ws transport goroutine panicked') + the site label for the panic value and stack. See docs/concurrency-patterns.md for the class."
          runbook_url: "https://github.com/BearBinary/omni-infra-provider-truenas/blob/main/docs/concurrency-patterns.md#runtime-observability"

      # Companion to TrueNASWSGoroutinePanicRecurrence: catches the case
      # where the goroutine panics so quickly the metric endpoint is never
      # scraped between panic and re-panic. On-call is paged by the process
      # restart signal even if the panic-counter never gets exported.
      - alert: TrueNASWSGoroutinePanicCrashLoop
        expr: changes(process_start_time_seconds{job="truenas-provider"}[5m]) >= 2
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "truenas-provider crash-looping (>= 2 restarts in 5m)"
          description: "The pod restarted at least twice in the last 5 minutes. If truenas_ws_goroutine_panics_total is zero at scrape time but the process is restarting, the panic is happening before the metrics endpoint serves — check kubectl logs for panic stack traces. See docs/concurrency-patterns.md."
          runbook_url: "https://github.com/BearBinary/omni-infra-provider-truenas/blob/main/docs/concurrency-patterns.md#runtime-observability"

      # Transport close outcomes other than clean should be rare. Alert on
      # cumulative event count (>= 3 in 10m) rather than instantaneous rate,
      # because a single close-timeout sustained through a `rate > 0 for 10m`
      # window would flap noisily on quiet baselines. The `>= 3` shape means:
      # ignore isolated events, page only on a genuine pattern.
      - alert: TrueNASWSCloseTimeouts
        expr: increase(truenas_ws_close_outcome_total{outcome=~"inflight_timeout|close_timeout"}[10m]) >= 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "wsTransport.Close hit {{ $labels.outcome }} >= 3 times in 10 minutes"
          description: "wsTransport.Close hit the {{ $labels.outcome }} branch. If this exceeds the pod's terminationGracePeriodSeconds, the singleton lease is left dirty and requires stale-heartbeat takeover on next boot. Check the chart's podGracePeriodSeconds value and reconnect() backoff duration."
          runbook_url: "https://github.com/BearBinary/omni-infra-provider-truenas/blob/main/docs/concurrency-patterns.md#runtime-observability"

      # Shutdown-ordering canary. wsTransport.Call / UploadFile returning
      # ErrTransportClosed means a caller is still driving the transport
      # after Close() has been invoked — a shutdown-order regression in the
      # caller layer that would otherwise only be visible in structured logs.
      - alert: TrueNASWSCallRejectedAfterClose
        expr: rate(truenas_ws_call_rejected_total{reason="closed"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "WS calls rejected because transport is closed"
          description: "wsTransport.Call/UploadFile is returning ErrTransportClosed. Sustained rate indicates a shutdown-ordering bug — a caller is still issuing calls after Close() has been called. Grep logs (event=call_rejected) or query Loki: {job=\"truenas-provider\", event=\"call_rejected\"}. See docs/concurrency-patterns.md."
          runbook_url: "https://github.com/BearBinary/omni-infra-provider-truenas/blob/main/docs/concurrency-patterns.md#runtime-observability"
