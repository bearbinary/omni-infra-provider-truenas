# Local observability stack for development.
# Usage: docker compose -f deploy/observability/docker-compose.yaml up -d
#
# Then run the provider with:
#   OTEL_EXPORTER_OTLP_ENDPOINT=localhost:4317 PYROSCOPE_URL=http://localhost:4040 ./_out/omni-infra-provider-truenas
#
# Port conflicts? Override any port with env vars:
#   GRAFANA_PORT=13000 OTEL_PORT=14317 PROM_PORT=19090 LOKI_PORT=13100 docker compose ... up -d
#
# Dashboards:
#   Grafana:    http://localhost:${GRAFANA_PORT:-3000} (admin/admin) — auto-loads TrueNAS Provider dashboards
#   Pyroscope:  http://localhost:${PYROSCOPE_PORT:-4040}
#   Prometheus: http://localhost:${PROM_PORT:-9090} — includes alerting rules
#   Loki:       http://localhost:${LOKI_PORT:-3100} — log aggregation (queried via Grafana)

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${OTEL_PORT:-4317}:4317"
      - "${OTEL_METRICS_PORT:-8889}:8889"

  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro

  prometheus:
    image: prom/prometheus:v3.4.0
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ./alerts:/etc/prometheus/alerts:ro
    ports:
      - "${PROM_PORT:-9090}:9090"

  loki:
    image: grafana/loki:3.5.0
    command: ["-config.file=/etc/loki/loki.yaml"]
    user: "0"
    volumes:
      - ./loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/var/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"

  pyroscope:
    image: grafana/pyroscope:1.13.3
    ports:
      - "${PYROSCOPE_PORT:-4040}:4040"

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_INSTALL_PLUGINS: "grafana-lokiexplore-app 1.0.37,grafana-pyroscope-app 1.17.0"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro

volumes:
  loki-data:
