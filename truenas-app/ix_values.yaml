# Default values for omni-infra-provider-truenas TrueNAS app

omniEndpoint: ""
omniServiceAccountKey: ""
omniInsecureSkipVerify: false

providerId: "truenas"
providerName: "TrueNAS"
providerDescription: "TrueNAS SCALE infrastructure provider"

defaultPool: "default"
defaultNetworkInterface: ""
defaultBootMethod: "UEFI"
concurrency: 4
logLevel: "info"

image:
  repository: ghcr.io/bearbinary/omni-infra-provider-truenas
  tag: latest

resources:
  limits:
    cpu: "500m"
    memory: "256Mi"
