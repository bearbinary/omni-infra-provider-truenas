groups:
  - name: Omni Connection
    description: Configure the connection to the Omni control plane
  - name: Provider Identity
    description: How this provider appears in Omni
  - name: VM Defaults
    description: Default settings for provisioned VMs
  - name: Advanced
    description: Advanced provider settings
  - name: Resources
    description: Container resource limits

questions:

  # --- Omni Connection ---

  - variable: omniEndpoint
    label: Omni Endpoint
    description: Full URL of your Omni instance (e.g., https://omni.example.com)
    group: Omni Connection
    schema:
      type: string
      required: true

  - variable: omniServiceAccountKey
    label: Omni Service Account Key
    description: >
      Base64-encoded service account key. Create with:
      omnictl serviceaccount create --role=InfraProvider infra-provider:truenas
    group: Omni Connection
    schema:
      type: string
      required: true
      private: true

  - variable: omniInsecureSkipVerify
    label: Skip Omni TLS Verification
    description: Disable TLS certificate verification for the Omni endpoint
    group: Omni Connection
    schema:
      type: boolean
      default: false

  # --- Provider Identity ---

  - variable: providerId
    label: Provider ID
    description: Unique provider identifier — must match what you registered in Omni
    group: Provider Identity
    schema:
      type: string
      default: "truenas"
      required: true

  - variable: providerName
    label: Provider Display Name
    description: How this provider appears in the Omni UI
    group: Provider Identity
    schema:
      type: string
      default: "TrueNAS"

  - variable: providerDescription
    label: Provider Description
    group: Provider Identity
    schema:
      type: string
      default: "TrueNAS SCALE infrastructure provider"

  # --- VM Defaults ---

  - variable: defaultPool
    label: Default ZFS Pool
    description: ZFS pool used for VM zvols and cached ISO images
    group: VM Defaults
    schema:
      type: string
      default: "default"
      required: true

  - variable: defaultNetworkInterface
    label: Default Network Interface
    description: >
      Host network interface for VMs — can be a bridge (br100),
      VLAN interface (vlan666), or physical interface (enp5s0).
    group: VM Defaults
    schema:
      type: string
      default: ""

  - variable: defaultBootMethod
    label: Default Boot Method
    group: VM Defaults
    schema:
      type: string
      default: "UEFI"
      enum:
        - value: "UEFI"
          description: UEFI boot (recommended)
        - value: "BIOS"
          description: Legacy BIOS boot

  - variable: gracefulShutdownTimeout
    label: Graceful Shutdown Timeout
    description: Seconds to wait for ACPI shutdown before force-stop on deprovision
    group: VM Defaults
    schema:
      type: int
      default: 30
      min: 0
      max: 300

  # --- Advanced ---

  - variable: concurrency
    label: Concurrency
    description: Maximum number of parallel provision/deprovision operations
    group: Advanced
    schema:
      type: int
      default: 4
      min: 1
      max: 16

  - variable: logLevel
    label: Log Level
    group: Advanced
    schema:
      type: string
      default: "info"
      enum:
        - value: "debug"
          description: Debug
        - value: "info"
          description: Info
        - value: "warn"
          description: Warning
        - value: "error"
          description: Error

  # --- Resources ---

  - variable: resources
    label: Container Resources
    group: Resources
    schema:
      type: dict
      attrs:
        - variable: limits
          label: Limits
          schema:
            type: dict
            attrs:
              - variable: cpu
                label: CPU Limit
                schema:
                  type: string
                  default: "500m"
              - variable: memory
                label: Memory Limit
                schema:
                  type: string
                  default: "256Mi"
