syntax = "proto3";
package truenasspecs;

option go_package = "github.com/bearbinary/omni-infra-provider-truenas/api/specs";

// MachineSpec is stored in Omni in the infra provisioner state.
message MachineSpec {
  string uuid = 1;
  string schematic = 2;
  string talos_version = 3;
  string image_id = 4;
  int32 vm_id = 5;
  string zvol_path = 6;
  int32 cdrom_device_id = 7;
  reserved 8, 10;
  reserved "last_upgrade_snapshot", "nfs_dataset_path";
  repeated string additional_zvol_paths = 9;  // Paths of additional data zvols for cleanup tracking
}
