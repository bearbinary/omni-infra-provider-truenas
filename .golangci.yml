version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
  exclusions:
    rules:
      - linters: [gosec]
        text: "G402|G107"
      - path: _test\.go
        linters: [errcheck, gocritic]

formatters:
  enable:
    - gofmt
