version: "2"

run:
  timeout: 5m

linters:
  enable:
    - depguard
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
  settings:
    govet:
      # Enable all analyzers, including shadow. Shadowing masked the wsTransport
      # `closed` bool observability gap; keeping all vet analyzers on catches the
      # broader class.
      enable-all: true
      disable:
        # fieldalignment is noise on struct definitions we've already sized
        # deliberately (e.g. cache-line hot fields first). Re-enable if we
        # measure a per-instance allocation problem.
        - fieldalignment
    staticcheck:
      # SA2000 (sync.WaitGroup misuse) is the specific analyzer that flags the
      # class of bug this file's history has bitten us with. Keep the full SA
      # set on; SA and QF families are the correctness-load-bearing ones.
      checks:
        - "all"
    depguard:
      rules:
        main:
          deny:
            - pkg: "golang.org/x/crypto/openpgp"
              desc: "unmaintained (GO-2026-5932); use github.com/ProtonMail/gopenpgp/v3 primitives"
  exclusions:
    rules:
      - linters: [gosec]
        text: "G402|G107"
      - path: _test\.go
        linters: [errcheck, gocritic]

formatters:
  enable:
    - gofmt
