version: "2"

run:
  timeout: 5m

linters:
  enable:
    - depguard
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: "golang.org/x/crypto/openpgp"
              desc: "unmaintained (GO-2026-5932); use github.com/ProtonMail/gopenpgp/v3 primitives"
  exclusions:
    rules:
      - linters: [gosec]
        text: "G402|G107"
      - path: _test\.go
        linters: [errcheck, gocritic]

formatters:
  enable:
    - gofmt
